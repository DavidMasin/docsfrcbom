# Docsify is a static site (HTML + CDN-loaded JS). No build step required.
# This config tells Nixpacks to skip the Node default and just serve the files.

providers = []

[phases.setup]
nixPkgs = ['caddy']

[phases.install]
cmds = ['echo "no install step"']

[phases.build]
cmds = ['echo "no build step"']

[start]
cmd = 'caddy file-server --listen :${PORT:-8080} --root /app --browse=false'

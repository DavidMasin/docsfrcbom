<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="FRC BOM — complete documentation for frcbom.com. Manage your Bill of Materials, track manufacturing, and integrate with Onshape.">
  <title>FRC BOM Documentation</title>
  <link rel="icon" href="./assets/images/frcbomlogo.png">
  <!-- Docsify theme -->
  <link rel="stylesheet" href="//unpkg.com/docsify/themes/vue.css">
  <!-- Custom CSS (optional) -->
  <link rel="stylesheet" href="./assets/css/custom.css">
</head>
<body>
<div id="app"></div>

<!-- Docsify configuration -->
<script>
  window.$docsify = {
    name: 'FRC BOM Docs',
    repo: 'https://github.com/davidmasin/frcbom',
    logo: '/assets/images/frcbomlogo2.png',
    loadSidebar: true,
    loadNavbar: true,
    coverpage: true,
    onlyCover: false,
    subMaxLevel: 3,
    auto2top: true,
    maxLevel: 4,
    ga: '',
    search: {
      maxAge: 86400000,
      paths: 'auto',
      placeholder: 'Search docs…',
      noData: 'No results found.',
      depth: 6,
      hideOtherSidebarContent: false
    },
    pagination: {
      previousText: 'Previous',
      nextText: 'Next',
      crossChapter: true,
      crossChapterText: true
    },
    copyCode: {
      buttonText: 'Copy',
      errorText: 'Error',
      successText: 'Copied!'
    }
  }
</script>

<!-- Docsify CDN -->
<script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
<!-- Plugins -->
<script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
<script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
<script src="//unpkg.com/docsify-copy-code/dist/docsify-copy-code.js"></script>
<!-- Syntax highlighting for code blocks -->
<script src="//unpkg.com/prismjs/components/prism-bash.min.js"></script>
<script src="//unpkg.com/prismjs/components/prism-json.min.js"></script>
<script src="//unpkg.com/prismjs/components/prism-python.min.js"></script>
<script src="//unpkg.com/prismjs/components/prism-yaml.min.js"></script>
</body>
</html>
